<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DevOps Playground Ingest Lab</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body data-page="ingest">
    <header class="hero hero-ingest">
      <div class="hero-overlay"></div>
      <div class="shell topbar">
        <nav class="topnav" aria-label="Primary">
          <a class="nav-link" href="/chat">Chat</a>
          <a class="nav-link is-active" href="/ingest">Ingest</a>
        </nav>
      </div>
      <div class="shell hero-content">
        <div class="hero-copy">
          <h1>Ingest</h1>
          <p class="hero-text">Add files and index them for retrieval.</p>
        </div>
      </div>
    </header>

    <main class="shell workspace">
      <section class="panel panel-wide">
        <div class="section-heading">
          <div>
            <h2>Documents</h2>
          </div>
          <a class="ghost-link" href="/chat">Chat</a>
        </div>

        <form id="ingest-form" class="ingest-layout">
          <section class="console-surface composer">
            <label for="ingest-paths">Server paths</label>
            <textarea id="ingest-paths" class="small-textarea">sample_docs</textarea>
            <p class="hint">Use one path per line. Paths must be visible to the chatbot service.</p>

            <label for="ingest-files">Browser files</label>
            <input id="ingest-files" type="file" multiple accept=".txt,.md,.rst,.log,.csv,.json,.yaml,.yml,.html,.htm,.epub,.pdf">
            <p class="hint">PDFs are prepared before indexing.</p>

            <div class="toggle-row">
              <label class="switch"><input id="ingest-reset" type="checkbox"><span>Reset existing chunks first</span></label>
            </div>

            <button id="ingest-send" class="primary-action" type="submit">Start ingestion</button>
          </section>

          <aside class="control-stack">
            <section class="control-block">
              <label for="ingest-profiles">Ingest profiles</label>
              <select id="ingest-profiles" multiple></select>
              <label class="switch inline-switch"><input id="ingest-select-all" type="checkbox"><span>Select all ingest profiles</span></label>
            </section>
          </aside>
        </form>
      </section>

      <section class="panel">
        <div class="section-heading">
          <div>
            <h2>Result</h2>
          </div>
        </div>
        <pre id="ingest-result" class="terminal-display meta-display">{}</pre>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
