services:
  chatbot:
    build: .
    container_name: local-chatbot
    ports:
      - "${CHATBOT_PORT:-8088}:8088"
    environment:
      CHATBOT_CONFIG: /app/config/config.yml
      CHATBOT_DEFAULT_PROVIDER: ${CHATBOT_DEFAULT_PROVIDER:-openai}
      CHATBOT_DEFAULT_MODEL: ${CHATBOT_DEFAULT_MODEL:-gpt-4.1-mini}
      QDRANT_URL: ${QDRANT_URL:-http://playground-qdrant:6333}
      LOCAL_LLM_URL: ${LOCAL_LLM_URL:-http://playground-ollama:11434/api/chat}
      OLLAMA_EMBED_URL: ${OLLAMA_EMBED_URL:-http://playground-ollama:11434/api/embed}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CHATBOT_COMMAND_TOKEN: ${CHATBOT_COMMAND_TOKEN:-}
      COMPANY_API_URL: ${COMPANY_API_URL:-http://host.docker.internal:8001/health}
      API_URL: ${API_URL:-http://host.docker.internal:8000/graphql}
      FASTAPI_BASIC_AUTH_USERNAME: ${FASTAPI_BASIC_AUTH_USERNAME:-admin}
      FASTAPI_BASIC_AUTH_PASSWORD: ${FASTAPI_BASIC_AUTH_PASSWORD:-password}
    volumes:
      - ./config:/app/config:ro
      - ./sample_docs:/app/sample_docs:ro
      - ../api/graphql-library/generated:/api/graphql-library/generated:ro
      - chatbot-data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
      - playground-llm
      - playground-vector

volumes:
  chatbot-data:

networks:
  playground-llm:
    external: true
  playground-vector:
    external: true
