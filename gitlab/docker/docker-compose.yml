services:
  gitlab:
    image: ${GITLAB_CE_IMAGE:-gitlab/gitlab-ce:latest}
    container_name: gitlab-ce
    hostname: ${GITLAB_HOSTNAME:-gitlab.local}
    restart: unless-stopped
    shm_size: 256m
    environment:
      TZ: ${TZ:-UTC}
      GITLAB_OMNIBUS_CONFIG: |
        external_url '${GITLAB_EXTERNAL_URL:-http://localhost:8929}'
        gitlab_rails['initial_root_password'] = '${GITLAB_ROOT_PASSWORD:-password}'
    ports:
      - "${GITLAB_HTTP_PORT:-8929}:8929"
      - "${GITLAB_SSH_PORT:-2224}:22"
    volumes:
      - gitlab-config:/etc/gitlab
      - gitlab-logs:/var/log/gitlab
      - gitlab-data:/var/opt/gitlab

  gitlab-runner-1:
    image: gitlab/gitlab-runner:latest
    container_name: gitlab-runner-1
    restart: unless-stopped
    depends_on:
      - gitlab
    environment:
      RUNNER_NAME: gitlab-worker-1
      RUNNER_TAG_LIST: worker-1,docker
      RUNNER_GITLAB_URL: ${RUNNER_GITLAB_URL:-http://gitlab:8929}
      RUNNER_EXECUTOR: ${RUNNER_EXECUTOR:-docker}
      RUNNER_DOCKER_IMAGE: ${RUNNER_DOCKER_IMAGE:-alpine:3.20}
      RUNNER_TOKEN: ${RUNNER_1_TOKEN}
      RUNNER_REGISTRATION_TOKEN: ${RUNNER_REGISTRATION_TOKEN}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - gitlab-runner-1-config:/etc/gitlab-runner
      - ./runner/register-runner.sh:/register-runner.sh:ro
    entrypoint: ["/bin/sh", "/register-runner.sh"]

  gitlab-runner-2:
    image: gitlab/gitlab-runner:latest
    container_name: gitlab-runner-2
    restart: unless-stopped
    depends_on:
      - gitlab
    environment:
      RUNNER_NAME: gitlab-worker-2
      RUNNER_TAG_LIST: worker-2,docker
      RUNNER_GITLAB_URL: ${RUNNER_GITLAB_URL:-http://gitlab:8929}
      RUNNER_EXECUTOR: ${RUNNER_EXECUTOR:-docker}
      RUNNER_DOCKER_IMAGE: ${RUNNER_DOCKER_IMAGE:-alpine:3.20}
      RUNNER_TOKEN: ${RUNNER_2_TOKEN}
      RUNNER_REGISTRATION_TOKEN: ${RUNNER_REGISTRATION_TOKEN}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - gitlab-runner-2-config:/etc/gitlab-runner
      - ./runner/register-runner.sh:/register-runner.sh:ro
    entrypoint: ["/bin/sh", "/register-runner.sh"]

volumes:
  gitlab-config:
  gitlab-logs:
  gitlab-data:
  gitlab-runner-1-config:
  gitlab-runner-2-config:
