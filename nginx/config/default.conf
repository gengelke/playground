server {
    listen 443 ssl;
    server_name localhost;

    ssl_certificate /etc/nginx/tls/playground-nginx.crt;
    ssl_certificate_key /etc/nginx/tls/playground-nginx.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}
