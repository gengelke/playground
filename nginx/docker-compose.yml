services:
  nginx:
    image: docker.io/nginx:1.27-alpine
    container_name: playground-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTPS_PORT:-8443}:443"
    volumes:
      - ./www:/usr/share/nginx/html:ro
      - ./config/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./.state/tls:/etc/nginx/tls:ro
    healthcheck:
      test: ["CMD-SHELL", "wget --no-check-certificate -q -O /dev/null https://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
