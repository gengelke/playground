services:
  ollama:
    image: ollama/ollama:${OLLAMA_IMAGE_TAG:-latest}
    container_name: playground-ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ./data:/root/.ollama
    restart: unless-stopped
    networks:
      - playground-llm

networks:
  playground-llm:
    external: true
